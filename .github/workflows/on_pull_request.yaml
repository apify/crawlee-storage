name: CI (PR)

on:
  # Runs whenever a pull request is opened or updated.
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr_title_check:
    name: PR title check
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code_checks:
    name: Code checks
    uses: ./.github/workflows/_check_code.yaml
