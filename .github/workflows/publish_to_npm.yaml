name: npm publish

env:
  DEBUG: napi:*
  APP_NAME: fs-storage-native
  MACOSX_DEPLOYMENT_TARGET: "10.13"

permissions:
  contents: read
  id-token: write # Required for OIDC trusted publishing.

on:
  # Dispatch only. This is the single workflow configured in npm OIDC trusted
  # publishing, and it is invoked by the release orchestrators (manual_release_node.yaml
  # and on_master.yaml) via apify/actions/execute-workflow. It expects the version in
  # package.json at `ref` to already be set.
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish (branch, tag, or commit SHA)
        required: true
        type: string
      tag:
        description: npm dist-tag
        required: true
        type: choice
        default: latest
        options:
          - latest
          - next

jobs:
  build:
    name: Build - ${{ matrix.settings.target }}
    defaults:
      run:
        working-directory: crawlee-storage-node
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            build: npm run build -- --target x86_64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
            build: npm run build -- --target aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build -- --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crawlee-storage-node/target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        shell: bash
        run: ${{ matrix.settings.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crawlee-storage-node/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  publish:
    name: Publish
    needs: [build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crawlee-storage-node
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Move artifacts
        run: npm run artifacts

      - name: List packages
        run: ls -R ./npm
        shell: bash

      # Tack on a `-beta.N` suffix for prerelease publishes. The upstream
      # git-cliff-release action emits bare versions (e.g. 0.1.5) for
      # `release_type: prerelease`, so we patch the version here right before
      # publishing. The committed package.json keeps the bare version.
      # See .github/scripts/before-beta-release.js for the gory details.
      - name: Bump prerelease version
        if: ${{ inputs.tag == 'next' }}
        run: |
          node ../.github/scripts/before-beta-release.js
          npm run copy-version

      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ inputs.tag }}
