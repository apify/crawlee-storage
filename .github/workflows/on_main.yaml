name: CI (main)

on:
  push:
    branches:
      - main
    tags-ignore:
      - "**" # Ignore all tags to avoid duplicate executions triggered by tag pushes.

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  code_checks:
    name: Code checks
    uses: ./.github/workflows/_check_code.yaml

  release_metadata:
    # Run this only for commits that would trigger a version bump.
    if: >-
      startsWith(github.event.head_commit.message, 'feat') ||
      startsWith(github.event.head_commit.message, 'fix') ||
      startsWith(github.event.head_commit.message, 'perf') ||
      startsWith(github.event.head_commit.message, 'refactor') ||
      startsWith(github.event.head_commit.message, 'style')
    name: Release metadata
    needs: [code_checks]
    runs-on: ubuntu-latest
    outputs:
      version_number: ${{ steps.metadata.outputs.version_number }}
      changelog: ${{ steps.metadata.outputs.changelog }}
    steps:
      - uses: apify/actions/git-cliff-release@v1.2.0
        id: metadata
        name: Prepare release metadata
        with:
          release_type: prerelease
          existing_changelog_path: CHANGELOG.md

  update_changelog:
    name: Changelog & version bump
    needs: [release_metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_commit_sha: ${{ steps.commit.outputs.commit_long_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
        working-directory: crawlee-storage-node

      - name: Bump package version
        working-directory: crawlee-storage-node
        run: |
          npm version --no-git-tag-version --allow-same-version "${{ needs.release_metadata.outputs.version_number }}"
          npm run copy-version

      - name: Write changelog
        uses: DamianReeves/write-file-action@master
        with:
          path: CHANGELOG.md
          write-mode: overwrite
          contents: ${{ needs.release_metadata.outputs.changelog }}

      - name: Commit changes
        id: commit
        uses: apify/actions/signed-commit@v1.2.0
        with:
          message: "chore(release): Set pre-release version to ${{ needs.release_metadata.outputs.version_number }} and update changelog [skip ci]"
          pull: "--rebase --autostash"
          github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

  publish:
    name: Publish pre-release to npm
    needs: [update_changelog]
    runs-on: ubuntu-latest
    permissions:
      actions: write # Required to dispatch publish_to_npm.yaml.
    steps:
      # Pre-releases are published under the "next" dist-tag via the single
      # npm-OIDC-trusted workflow. No GitHub release is created for pre-releases.
      - name: Publish to npm
        uses: apify/actions/execute-workflow@v1.2.0
        with:
          workflow: publish_to_npm.yaml
          inputs: >
            {
              "ref": "${{ needs.update_changelog.outputs.release_commit_sha }}",
              "tag": "next"
            }
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
