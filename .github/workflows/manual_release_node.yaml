name: Node release

permissions:
  contents: write
  actions: write # Required to dispatch publish_to_npm.yaml.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: The custom version to bump to (only for "custom" type)
        required: false
        type: string
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  code_checks:
    name: Code checks
    uses: ./.github/workflows/_check_code.yaml

  release_metadata:
    name: Release metadata
    needs: [code_checks]
    runs-on: ubuntu-latest
    outputs:
      version_number: ${{ steps.metadata.outputs.version_number }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
      changelog: ${{ steps.metadata.outputs.changelog }}
    steps:
      - uses: apify/actions/git-cliff-release@v1.2.0
        id: metadata
        name: Prepare release metadata
        with:
          release_type: ${{ github.event.inputs.release_type }}
          custom_version: ${{ github.event.inputs.custom_version }}
          existing_changelog_path: CHANGELOG.md

  update_changelog:
    name: Changelog & version bump
    needs: [release_metadata]
    runs-on: ubuntu-latest
    outputs:
      release_commit_sha: ${{ steps.commit.outputs.commit_long_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
        working-directory: crawlee-storage-node

      - name: Bump package version
        working-directory: crawlee-storage-node
        run: |
          npm version --no-git-tag-version --allow-same-version "${{ needs.release_metadata.outputs.version_number }}"
          npm run copy-version

      - name: Write changelog
        uses: DamianReeves/write-file-action@master
        with:
          path: CHANGELOG.md
          write-mode: overwrite
          contents: ${{ needs.release_metadata.outputs.changelog }}

      - name: Commit changes
        id: commit
        uses: apify/actions/signed-commit@v1.2.0
        with:
          message: "chore(release): Set package version to ${{ needs.release_metadata.outputs.version_number }} and update changelog [skip ci]"
          pull: "--rebase --autostash"
          github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

  github_release:
    name: GitHub release
    needs: [release_metadata, update_changelog]
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release_metadata.outputs.tag_name }}
          name: ${{ needs.release_metadata.outputs.version_number }}
          target_commitish: ${{ needs.update_changelog.outputs.release_commit_sha }}
          body: ${{ needs.release_metadata.outputs.release_notes }}

  publish:
    name: Publish to npm
    needs: [update_changelog]
    runs-on: ubuntu-latest
    steps:
      # Publishing happens in the single npm-OIDC-trusted workflow, dispatched
      # against the freshly bumped commit.
      - name: Publish to npm
        uses: apify/actions/execute-workflow@v1.2.0
        with:
          workflow: publish_to_npm.yaml
          inputs: >
            {
              "ref": "${{ needs.update_changelog.outputs.release_commit_sha }}",
              "tag": "latest"
            }
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
